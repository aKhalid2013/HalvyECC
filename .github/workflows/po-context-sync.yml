name: PO Context Sync

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - 'docs/specs/**'
      - 'docs/phases/**'
      - 'docs/prd/**'
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC

concurrency:
  group: docs-commit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate PO-CONTEXT.md
        run: node scripts/generate-po-context.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/PO-CONTEXT.md
          git diff --staged --quiet || git commit -m "chore: regenerate PO-CONTEXT.md [skip ci]"
          git pull --rebase origin master
          git push
