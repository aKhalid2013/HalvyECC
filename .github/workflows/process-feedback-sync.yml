name: Process Feedback Sync

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - 'feedback-logs/**'
  schedule:
    - cron: '0 9 * * 5'

concurrency:
  group: docs-commit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate PROCESS-FEEDBACK.md
        run: node scripts/generate-process-feedback.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/PROCESS-FEEDBACK.md
          git diff --staged --quiet || git commit -m "chore: regenerate PROCESS-FEEDBACK.md [skip ci]"
          git pull --rebase origin master
          git push
