appId: com.halvy.app
# NOTE: Post-submission assertions ("Check your email") require a live Supabase connection.
# This flow tests navigation and form rendering only (runtime oracle for API submission).
---
- launchApp
- tapOn: "Sign in with Magic Link"
- assertVisible: "Sign in with email"
- assertVisible: "We'll email you a magic link to sign in."
- tapOn:
    id: "email-input"
- inputText: "test@example.com"
- assertVisible: "Send Magic Link"
- tapOn: "Back to sign-in"
- assertVisible: "Continue with Google"
